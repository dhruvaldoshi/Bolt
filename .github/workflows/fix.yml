name: Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fix App.jsx
        run: |
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('src/App.jsx', 'utf8');
          c = c.replace(/[\u2018\u2019]/g, \"'\");
          c = c.replace(/[\u201c\u201d]/g, '\"');
          c = c.replace(/\u2026/g, '...');
          fs.writeFileSync('src/App.jsx', c);
          console.log('Done');
          "
      - name: Commit fix
        run: |
          git config user.email "fix@bolt.com"
          git config user.name "Bolt Fix"
          git add src/App.jsx
          git diff --staged --quiet || git commit -m "fix: correct quotes in App.jsx"
          git push
