name: Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fix App.jsx
        run: |
          curl -L "https://raw.githubusercontent.com/nicholasgasior/test/main/README.md" -o /dev/null
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('src/App.jsx', 'utf8');
          c = c.replace(/\u2018|\u2019/g, \"'\");
          c = c.replace(/\u201c|\u201d/g, '\"');
          c = c.replace(/\u2026/g, '...');
          fs.writeFileSync('src/App.jsx', c);
          console.log('Fixed');
          "
      - uses: actions/upload-artifact@v3
        with:
          name: fixed
          path: src/App.jsx
      - run: |
          git config user.email "fix@bolt.com"
          git config user.name "Bolt Fix"
          git add src/App.jsx
          git commit -m "fix quotes" || echo "no changes"
          git push

